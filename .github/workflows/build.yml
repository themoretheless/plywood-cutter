name: Build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM
        working-directory: crates/wasm
        run: wasm-pack build --target web --release

      - name: Install wasm-opt
        run: |
          BINARYEN_VER=version_120
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VER}/binaryen-${BINARYEN_VER}-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-${BINARYEN_VER}/bin" >> $GITHUB_PATH

      - name: Optimize WASM
        run: |
          wasm-opt -Oz --enable-bulk-memory \
            crates/wasm/pkg/cutter_wasm_bg.wasm \
            -o crates/wasm/pkg/cutter_wasm_bg.wasm
          ls -lh crates/wasm/pkg/cutter_wasm_bg.wasm

      - name: Copy WASM to frontend
        run: |
          mkdir -p frontend/wasm frontend/public
          cp -r crates/wasm/pkg/* frontend/wasm/
          cp crates/wasm/pkg/cutter_wasm_bg.wasm frontend/public/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vue
        working-directory: frontend
        run: npx vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Run Rust tests
        run: cargo test -p cutter-core
